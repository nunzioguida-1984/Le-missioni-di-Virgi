const { useState, useRef, useEffect, useCallback } = React;

let audioCtx = null;
function getCtx() {
  if (!audioCtx) { const AC = window.AudioContext || window.webkitAudioContext; audioCtx = new AC(); }
  if (audioCtx.state === "suspended") audioCtx.resume();
  return audioCtx;
}
function playTone(freq, start, dur, type = "sine", gainPeak = 0.18) {
  try {
    const ctx = getCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type; osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.0001, ctx.currentTime + start);
    gain.gain.exponentialRampToValueAtTime(gainPeak, ctx.currentTime + start + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + start + dur);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(ctx.currentTime + start); osc.stop(ctx.currentTime + start + dur + 0.05);
  } catch (e) {}
}
const Sound = {
  correct: () => { playTone(660, 0, 0.12); playTone(880, 0.1, 0.18); },
  wrong: () => { playTone(180, 0, 0.18, "sine", 0.12); },
  skip: () => { playTone(440, 0, 0.08); },
  missionDone: () => { [392, 466, 523, 587, 659, 784, 880, 1046].forEach((f, i) => playTone(f, i * 0.08, 0.22, "triangle", 0.18)); },
};
function useSound(enabled) { return useCallback((fn) => { if (enabled) fn(); }, [enabled]); }

const storage = {
  get: async (key) => { try { const v = localStorage.getItem(key); return v ? { key, value: v } : null; } catch (e) { return null; } },
  set: async (key, value) => { try { localStorage.setItem(key, value); return { key, value }; } catch (e) { return null; } },
};

const STORAGE_KEY = "missioni-virginia-v3";
const ERRORS_KEY = "missioni-virginia-errors-v3";

function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

const NUM_IT = {0:"zero",1:"uno",2:"due",3:"tre",4:"quattro",5:"cinque",6:"sei",7:"sette",8:"otto",9:"nove",10:"dieci",11:"undici",12:"dodici",13:"tredici",14:"quattordici",15:"quindici",16:"sedici",17:"diciassette",18:"diciotto",19:"diciannove",20:"venti",21:"ventuno",22:"ventidue",23:"ventitré",24:"ventiquattro",25:"venticinque",26:"ventisei",27:"ventisette",28:"ventotto",29:"ventinove",30:"trenta",31:"trentuno",32:"trentadue",33:"trentatré",34:"trentaquattro",35:"trentacinque",36:"trentasei",37:"trentasette",38:"trentotto",39:"trentanove",40:"quaranta",41:"quarantuno",42:"quarantadue",43:"quarantatré",44:"quarantaquattro",45:"quarantacinque",46:"quarantasei",47:"quarantasette",48:"quarantotto",49:"quarantanove",50:"cinquanta"};

function generateAddition(forceTarget) {
  const result = forceTarget || randInt(5, 50);
  const a = randInt(1, result - 1);
  return { a, b: result - a, result, type: "add" };
}
function generateSubtraction(forceTarget) {
  const result = forceTarget || randInt(5, 40);
  const b = randInt(1, 9);
  return { a: result + b, b, result, type: "sub" };
}
function makeCalcExercise(opType, forceBias) {
  const target = forceBias ? (Math.random() < 0.5 ? 16 : 17) : null;
  const calc = opType === "add" ? generateAddition(target) : generateSubtraction(target);
  return { type: "calc", opType, a: calc.a, b: calc.b, result: calc.result };
}

const READ_IT = [
  { text: "VIRGINIA GIOCA CON LA SUA SORELLINA IN GIARDINO.", emoji: "🌻" },

  { text: "DOMANI ANDIAMO IN BARCA CON PAPÀ.", emoji: "⛵" },
];
const READ_CA = [

  { text: "AVUI EL SOL BRILLA MOLT FORT SOBRE EL MAR.", emoji: "☀️" },

];
const WRITE_CA = [

  { sentence: "EL GAT ÉS BLANC", emoji: "🐱" },
  { sentence: "TINC UNA GERMANA", emoji: "👧" },
  { sentence: "M'AGRADA EL MAR", emoji: "🌊" },
  { sentence: "EL PASTÍS ÉS BO", emoji: "🎂" },
  { sentence: "VAIG EN VAIXELL", emoji: "⛵" },
];
const WRITE_IT = [
  { sentence: "IL SOLE È GIALLO", emoji: "☀️" },
  { sentence: "IL GATTO È BIANCO", emoji: "🐱" },
  { sentence: "HO UNA SORELLA", emoji: "👧" },
  { sentence: "MI PIACE IL MARE", emoji: "🌊" },
  { sentence: "LA TORTA È BUONA", emoji: "🎂" },
  { sentence: "VADO IN BARCA", emoji: "⛵" },
];

function buildMissions() {
  const missions = [];
  for (let m = 0; m < 6; m++) {
    const inv = m % 2 === 1;
    const readLang = inv ? "CA" : "IT";
    const writeLang = inv ? "IT" : "CA";
    const readPool = inv ? READ_CA : READ_IT;
    const writePool = inv ? WRITE_IT : WRITE_CA;
    const idx = Math.floor(m / 2) % 3;
    missions.push({
      id: `m${m}`, title: `MISSIONE ${m + 1}`,
      exercises: [
        { id: `m${m}-add`, ...makeCalcExercise("add", m % 2 === 0), label: `${m % 2 === 0 ? "16/17" : "ADDIZIONE"}` },
        { id: `m${m}-sub`, ...makeCalcExercise("sub", m % 2 === 1), label: `${m % 2 === 1 ? "16/17" : "SOTTRAZIONE"}` },
        { id: `m${m}-read`, type: "read", lang: readLang, text: readPool[idx].text, emoji: readPool[idx].emoji },
        { id: `m${m}-write`, type: "write", lang: writeLang, sentence: writePool[idx].sentence, emoji: writePool[idx].emoji },
      ],
    });
  }
  return missions;
}
const MISSIONS = buildMissions();
const FLAT = MISSIONS.flatMap((m) => m.exercises.map((e) => ({ ...e, missionId: m.id, missionTitle: m.title })));
const LANG_BADGE = { IT: { label: "ITA", color: "#16A34A" }, CA: { label: "CAT", color: "#7C3AED" } };

function shuffle(arr) { const a = [...arr]; for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }

// ---------- APP ----------
function App() {
  const [currentIndex, setCurrentIndex] = useState(0);
  const [completed, setCompleted] = useState({});
  const [stars, setStars] = useState(0);
  const [loaded, setLoaded] = useState(false);
  const [showCelebration, setShowCelebration] = useState(null);
  const [soundOn, setSoundOn] = useState(true);
  const [errors, setErrors] = useState([]);
  const [view, setView] = useState("game"); // "game" | "parents"
  const playSound = useSound(soundOn);

  useEffect(() => {
    (async () => {
      try {
        const res = await storage.get(STORAGE_KEY);
        if (res?.value) { const d = JSON.parse(res.value); setCompleted(d.completed || {}); setStars(d.stars || 0); setCurrentIndex(d.currentIndex || 0); }
        const errRes = await storage.get(ERRORS_KEY);
        if (errRes?.value) setErrors(JSON.parse(errRes.value));
      } catch (e) {}
      setLoaded(true);
    })();
  }, []);

  const saveProgress = useCallback(async (c, s, i) => {
    try { await storage.set(STORAGE_KEY, JSON.stringify({ completed: c, stars: s, currentIndex: i })); } catch (e) {}
  }, []);
  const saveErrors = useCallback(async (errs) => {
    try { await storage.set(ERRORS_KEY, JSON.stringify(errs)); } catch (e) {}
  }, []);

  const ex = FLAT[currentIndex];
  const totalDone = Object.keys(completed).length;
  const mIdx = MISSIONS.findIndex((m) => m.id === ex?.missionId);

  const advance = useCallback((newCompleted, newStars) => {
    const missionDone = MISSIONS[mIdx]?.exercises.every((e) => newCompleted[e.id]);
    if (missionDone) { playSound(Sound.missionDone); setShowCelebration("mission"); }
    else setShowCelebration("exercise");
    setTimeout(() => {
      setShowCelebration(null);
      const next = Math.min(currentIndex + 1, FLAT.length - 1);
      setCurrentIndex(next);
      saveProgress(newCompleted, newStars, next);
    }, missionDone ? 2600 : 1000);
  }, [currentIndex, mIdx, playSound, saveProgress]);

  const handleCorrect = useCallback(() => {
    const newCompleted = { ...completed, [ex.id]: true };
    const newStars = stars + 1;
    setCompleted(newCompleted); setStars(newStars);
    playSound(Sound.correct);
    advance(newCompleted, newStars);
  }, [completed, ex, stars, playSound, advance]);

  const handleWrong = useCallback(() => {
    playSound(Sound.wrong);
    const label = ex.type === "calc"
      ? `${ex.a} ${ex.opType === "add" ? "+" : "−"} ${ex.b} = ${ex.result}`
      : ex.type === "read" ? ex.text : ex.sentence;
    const newErr = { id: ex.id, missionTitle: ex.missionTitle, type: ex.type, lang: ex.lang, label, date: new Date().toLocaleDateString("it-IT") };
    const newErrors = [newErr, ...errors.filter((e) => e.id !== ex.id)].slice(0, 50);
    setErrors(newErrors); saveErrors(newErrors);
  }, [ex, errors, playSound, saveErrors]);

  const handleSkip = useCallback(() => {
    playSound(Sound.skip);
    const next = Math.min(currentIndex + 1, FLAT.length - 1);
    setCurrentIndex(next);
    saveProgress(completed, stars, next);
  }, [currentIndex, completed, stars, playSound, saveProgress]);

  const resetProgress = async () => { setCompleted({}); setStars(0); setCurrentIndex(0); await saveProgress({}, 0, 0); };
  const clearErrors = async () => { setErrors([]); await saveErrors([]); };

  const allDone = totalDone === FLAT.length;
  const missionsDone = MISSIONS.filter((m) => m.exercises.every((e) => completed[e.id])).length;

  if (!loaded) return (
    <div style={styles.loadingScreen}>
      <FontLoader />
      <div style={{ fontSize: 48 }}>🦄</div>
      <p style={{ fontFamily: "Quicksand", color: "#7C3AED", fontWeight: 700, textTransform: "uppercase" }}>CARICAMENTO...</p>
    </div>
  );

  if (view === "parents") return (
    <div style={styles.app}>
      <FontLoader />
      <ParentsView errors={errors} onBack={() => setView("game")} onClear={clearErrors} />
    </div>
  );

  if (allDone) return (
    <div style={styles.app}>
      <FontLoader />
      <FinalScreen stars={stars} onReset={resetProgress} />
    </div>
  );

  return (
    <div style={styles.app}>
      <FontLoader />
      <p style={styles.appTitle}>🦄 LE MISSIONI DI VIRGINIA 🦄</p>
      <TopBar stars={stars} missionsDone={missionsDone} totalMissions={MISSIONS.length} totalDone={totalDone} totalEx={FLAT.length} soundOn={soundOn} onToggleSound={() => setSoundOn((s) => !s)} onParents={() => setView("parents")} />
      <MissionStrip missions={MISSIONS} completed={completed} currentMissionIndex={mIdx} />
      <ExerciseStage key={ex.id} exercise={ex} onCorrect={handleCorrect} onWrong={handleWrong} onSkip={handleSkip} playSound={playSound} />
      {showCelebration === "exercise" && <BurstCelebration />}
      {showCelebration === "mission" && <MissionCelebration title={ex.missionTitle} />}
      <button onClick={resetProgress} style={styles.resetButton}>RICOMINCIA</button>
    </div>
  );
}

function TopBar({ stars, missionsDone, totalMissions, totalDone, totalEx, soundOn, onToggleSound, onParents }) {
  return (
    <div style={styles.topBar}>
      <div style={styles.topBarRow}>
        <div style={styles.avatarRow}>
          <div style={styles.avatarCircle}>🦄</div>
          <div>
            <p style={styles.greetName}>VIRGINIA</p>
            <p style={styles.greetSub}>{missionsDone} / {totalMissions} MISSIONI</p>
          </div>
        </div>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          <button onClick={onParents} style={styles.parentsBtn} title="Area genitori">👨‍👩‍👧</button>
          <button onClick={onToggleSound} style={styles.soundButton}>{soundOn ? "🔊" : "🔇"}</button>
          <div style={styles.starsPill}><span style={{ fontSize: 15 }}>⭐</span><span style={styles.starsPillNum}>{stars}</span></div>
        </div>
      </div>
      <div style={styles.levelBarOuter}><div style={{ ...styles.levelBarInner, width: `${(totalDone / totalEx) * 100}%` }} /></div>
    </div>
  );
}

function MissionStrip({ missions, completed, currentMissionIndex }) {
  return (
    <div style={styles.missionStripOuter}>
      <div style={styles.missionStripInner}>
        {missions.map((m, idx) => {
          const isDone = m.exercises.every((e) => completed[e.id]);
          const isCurrent = idx === currentMissionIndex;
          const doneCount = m.exercises.filter((e) => completed[e.id]).length;
          return (
            <div key={m.id} style={{ ...styles.missionChip, background: isDone ? "#FBBF24" : isCurrent ? "#7C3AED" : "#E9E4F5", color: isDone || isCurrent ? "white" : "#B9AEDC", transform: isCurrent ? "scale(1.08)" : "scale(1)" }}>
              <span style={{ fontSize: 13, fontWeight: 800 }}>{isDone ? "🏆" : `${doneCount}/4`}</span>
              <span style={{ fontSize: 10, fontWeight: 700 }}>M{idx + 1}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function ExerciseStage({ exercise, onCorrect, onWrong, onSkip, playSound }) {
  return (
    <div style={styles.stage}>
      <div style={styles.stageBanner}><span style={styles.stageBannerTitle}>{exercise.missionTitle}</span></div>
      <div style={styles.stageCard}>
        {exercise.type === "calc" && <CalcExercise exercise={exercise} onCorrect={onCorrect} onWrong={onWrong} />}
        {exercise.type === "read" && <ReadExercise exercise={exercise} onCorrect={onCorrect} onWrong={onWrong} />}
        {exercise.type === "write" && <WriteExercise exercise={exercise} onCorrect={onCorrect} onWrong={onWrong} />}
      </div>
      <button onClick={onSkip} style={styles.skipButton}>⏭ SALTA</button>
    </div>
  );
}

// ---------- CANVAS HOOK ----------
function useCanvas(onHasDrawn) {
  const canvasRef = useRef(null);
  const isDrawing = useRef(false);
  const lastPos = useRef({ x: 0, y: 0 });

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const ratio = window.devicePixelRatio || 1;
    canvas.width = canvas.clientWidth * ratio;
    canvas.height = canvas.clientHeight * ratio;
    ctx.scale(ratio, ratio);
  }, []);

  const getPos = (e) => {
    const canvas = canvasRef.current;
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: clientX - rect.left, y: clientY - rect.top };
  };
  const startDraw = (e) => { isDrawing.current = true; lastPos.current = getPos(e); onHasDrawn(true); };
  const draw = (e) => {
    if (!isDrawing.current) return;
    e.preventDefault();
    const ctx = canvasRef.current.getContext("2d");
    const pos = getPos(e);
    ctx.strokeStyle = "#1E1B2E"; ctx.lineWidth = 3.5; ctx.lineCap = "round"; ctx.lineJoin = "round";
    ctx.beginPath(); ctx.moveTo(lastPos.current.x, lastPos.current.y); ctx.lineTo(pos.x, pos.y); ctx.stroke();
    lastPos.current = pos;
  };
  const stopDraw = () => { isDrawing.current = false; };
  const clearCanvas = () => { const canvas = canvasRef.current; canvas.getContext("2d").clearRect(0, 0, canvas.width, canvas.height); onHasDrawn(false); };
  const handlers = { onMouseDown: startDraw, onMouseMove: draw, onMouseUp: stopDraw, onMouseLeave: stopDraw, onTouchStart: startDraw, onTouchMove: draw, onTouchEnd: stopDraw };
  return { canvasRef, clearCanvas, handlers };
}

// ---------- ESERCIZI ----------
function CheckButtons({ hasDrawn, onCorrect, onWrong, done }) {
  if (done) return <p style={styles.doneLabel}>✓ BRAVISSIMA!</p>;
  return (
    <div style={styles.checkRow}>
      <button onClick={onWrong} disabled={!hasDrawn} style={{ ...styles.wrongBtn, opacity: hasDrawn ? 1 : 0.4 }}>❌ SBAGLIATO</button>
      <button onClick={onCorrect} disabled={!hasDrawn} style={{ ...styles.correctBtn, opacity: hasDrawn ? 1 : 0.4 }}>✅ GIUSTO</button>
    </div>
  );
}

function CalcExercise({ exercise, onCorrect, onWrong }) {
  const [hasDrawn, setHasDrawn] = useState(false);
  const [done, setDone] = useState(false);
  const { canvasRef, clearCanvas, handlers } = useCanvas(setHasDrawn);
  const symbol = exercise.opType === "add" ? "+" : "−";
  const handleCorrect = () => { if (done) return; setDone(true); onCorrect(); };
  const handleWrong = () => { clearCanvas(); onWrong(); };

  return (
    <>
      <p style={styles.eyebrow}>{exercise.opType === "add" ? "ADDIZIONE" : "SOTTRAZIONE"} — SCRIVI IL RISULTATO</p>
      <div style={styles.calcDisplay}>
        <span style={styles.calcNum}>{exercise.a}</span>
        <span style={styles.calcSymbol}>{symbol}</span>
        <span style={styles.calcNum}>{exercise.b}</span>
        <span style={styles.calcSymbol}>=</span>
        <span style={styles.calcQuestion}>?</span>
      </div>
      <div style={styles.canvasWrapBig}><canvas ref={canvasRef} style={styles.canvasBig} {...handlers} /></div>
      <button onClick={clearCanvas} style={styles.clearButton}>🧹 PULISCI</button>
      <p style={styles.parentNote}>UN ADULTO CONTROLLA: IL NUMERO SCRITTO È GIUSTO?</p>
      <CheckButtons hasDrawn={hasDrawn} onCorrect={handleCorrect} onWrong={handleWrong} done={done} />
    </>
  );
}

function ReadExercise({ exercise, onCorrect, onWrong }) {
  const [done, setDone] = useState(false);
  const badge = LANG_BADGE[exercise.lang];
  const handleCorrect = () => { if (done) return; setDone(true); onCorrect(); };

  return (
    <>
      <p style={styles.eyebrow}>LEGGI AD ALTA VOCE <span style={{ ...styles.langBadge, background: badge.color }}>{badge.label}</span></p>
      <span style={styles.sceneEmojiBig}>{exercise.emoji}</span>
      <p style={styles.readSentence}>{exercise.text}</p>
      <p style={styles.parentNote}>UN ADULTO ASCOLTA: L'HA LETTA BENE?</p>
      {done ? <p style={styles.doneLabel}>✓ BRAVISSIMA!</p> : (
        <div style={styles.checkRow}>
          <button onClick={onWrong} style={styles.wrongBtn}>❌ RIPROVA</button>
          <button onClick={handleCorrect} style={styles.correctBtn}>✅ BRAVISSIMA</button>
        </div>
      )}
    </>
  );
}

function WriteExercise({ exercise, onCorrect, onWrong }) {
  const [hasDrawn, setHasDrawn] = useState(false);
  const [done, setDone] = useState(false);
  const { canvasRef, clearCanvas, handlers } = useCanvas(setHasDrawn);
  const badge = LANG_BADGE[exercise.lang];
  const handleCorrect = () => { if (done) return; setDone(true); onCorrect(); };
  const handleWrong = () => { clearCanvas(); onWrong(); };

  return (
    <>
      <p style={styles.eyebrow}>COPIA LA FRASE <span style={{ ...styles.langBadge, background: badge.color }}>{badge.label}</span></p>
      <span style={styles.sceneEmojiBig}>{exercise.emoji}</span>
      <p style={styles.readSentence}>{exercise.sentence}</p>
      <div style={styles.canvasWrapBig}><canvas ref={canvasRef} style={styles.canvasBig} {...handlers} /></div>
      <button onClick={clearCanvas} style={styles.clearButton}>🧹 PULISCI</button>
      <p style={styles.parentNote}>UN ADULTO CONTROLLA: LA FRASE SCRITTA È GIUSTA?</p>
      <CheckButtons hasDrawn={hasDrawn} onCorrect={handleCorrect} onWrong={handleWrong} done={done} />
    </>
  );
}

function ParentsView({ errors, onBack, onClear }) {
  return (
    <div style={styles.parentsContainer}>
      <FontLoader />
      <div style={styles.parentsHeader}>
        <button onClick={onBack} style={styles.backBtn}>← TORNA AL GIOCO</button>
        <p style={styles.parentsTitle}>👨‍👩‍👧 AREA GENITORI</p>
      </div>
      <p style={styles.parentsSubtitle}>ESERCIZI SEGNATI COME SBAGLIATI</p>
      {errors.length === 0 ? (

      ) : (
        <>
          <div style={styles.errorsList}>
            {errors.map((err, idx) => (
              <div key={idx} style={styles.errorCard}>

                  <span style={styles.errorMission}>{err.missionTitle}</span>

                </div>
                <p style={styles.errorLabel}>{err.label}</p>
                <span style={{ ...styles.errorType, background: err.type === "calc" ? "#DBEAFE" : err.type === "read" ? "#DCFCE7" : "#F3E8FF" }}>
                  {err.type === "calc" ? "🔢 CALCOLO" : err.type === "read" ? "📖 LETTURA" : "✏️ SCRITTURA"}
                </span>
              </div>
            ))}
          </div>
          <button onClick={onClear} style={styles.clearErrorsBtn}>🗑 CANCELLA TUTTI GLI ERRORI</button>
        </>
      )}
    </div>
  );
}

// ---------- CELEBRAZIONI ----------
function BurstCelebration() {
  const particles = Array.from({ length: 14 }, (_, i) => i);
  return (
    <div style={styles.celebrationOverlay}>
      {particles.map((i) => { const angle = (i / particles.length) * 2 * Math.PI; const dist = 80 + Math.random() * 50; return <span key={i} style={{ ...styles.particle, transform: `translate(${Math.cos(angle)*dist}px,${Math.sin(angle)*dist}px)` }}>⭐</span>; })}
    </div>
  );
}
function MissionCelebration({ title }) {
  const particles = Array.from({ length: 28 }, (_, i) => i);
  return (
    <div style={styles.celebrationOverlay}>
      {particles.map((i) => { const angle = (i / particles.length) * 2 * Math.PI; const dist = 130 + Math.random() * 100; const emoji = ["🏆","🦄","✨","⭐","🌈"][i%5]; return <span key={i} style={{ ...styles.particleBig, transform: `translate(${Math.cos(angle)*dist}px,${Math.sin(angle)*dist}px)` }}>{emoji}</span>; })}
      <div style={styles.missionBanner}>
        <p style={styles.missionBannerTitle}>{title} COMPLETATA!</p>
        <p style={styles.missionBannerSub}>🏆 PREMIO SBLOCCATO! 🏆</p>
      </div>
    </div>
  );
}
function FinalScreen({ stars, onReset }) {
  return (
    <div style={styles.finalScreen}>
      <div style={{ fontSize: 56, marginBottom: 14 }}>🦄🏆✨</div>
      <h1 style={styles.finalTitle}>TUTTE LE MISSIONI COMPLETATE!</h1>
      <p style={{ color: "#9D7BC4", fontWeight: 600, fontSize: 15, marginBottom: 24 }}>BRAVISSIMA VIRGINIA!</p>
      <div style={styles.finalStarsPill}><span style={{ fontSize: 28 }}>⭐</span><span style={styles.finalStarsNum}>{stars}</span><span style={{ color: "#92660D", fontWeight: 700, fontSize: 14 }}>STELLE</span></div>
      <button onClick={onReset} style={styles.finalResetButton}>RICOMINCIA DA CAPO</button>
    </div>
  );
}
function FontLoader() { return <style>{`@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Quicksand:wght@500;600;700&display=swap');`}</style>; }
