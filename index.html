let audioCtx = null;
function getCtx() {
  if (!audioCtx) {
    const AC = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AC();
  }
  if (audioCtx.state === "suspended") audioCtx.resume();
  return audioCtx;
}
function playTone(freq, start, dur, type = "sine", gainPeak = 0.18) {
  try {
    const ctx = getCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.0001, ctx.currentTime + start);
    gain.gain.exponentialRampToValueAtTime(gainPeak, ctx.currentTime + start + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + start + dur);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime + start);
    osc.stop(ctx.currentTime + start + dur + 0.05);
  } catch (e) {}
}
const Sound = {
  correct: () => { playTone(660, 0, 0.12); playTone(880, 0.1, 0.18); },
  wrong: () => { playTone(180, 0, 0.18, "sine", 0.12); },

  missionDone: () => { [392, 466, 523, 587, 659, 784, 880, 1046].forEach((f, i) => playTone(f, i * 0.08, 0.22, "triangle", 0.18)); },

};

/* ============================================================
   RICONOSCIMENTO CIFRE — validazione automatica esercizi di calcolo
   CNN addestrata nel browser su MNIST (client-side, gratuito, nessun
   dato inviato a server esterni). Include copie sintetiche del "7"
   con trattino orizzontale (stile europeo), assente in MNIST originale.
   Modello cachato in IndexedDB: solo la prima apertura richiede
   addestramento (~40-50 secondi), le successive sono istantanee.
   ============================================================ */
const MNIST_IMAGES_SPRITE_PATH = 'https://storage.googleapis.com/learnjs-data/model-builder/mnist_images.png';
const MNIST_LABELS_PATH = 'https://storage.googleapis.com/learnjs-data/model-builder/mnist_labels_uint8';
const DIGIT_IMAGE_SIZE = 784;
const DIGIT_NUM_CLASSES = 10;
const DIGIT_TRAIN_ELEMENTS = 8000;
const DIGIT_MODEL_KEY = 'indexeddb://virginia-digit-model-v5';

async function loadMnistTrainingData() {
  const resp = await fetch(MNIST_IMAGES_SPRITE_PATH);
  if (!resp.ok) throw new Error('Download immagini fallito: HTTP ' + resp.status);
  const blob = await resp.blob();
  const bitmap = await createImageBitmap(blob);

  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = bitmap.width;
  canvas.height = DIGIT_TRAIN_ELEMENTS;
  ctx.drawImage(bitmap, 0, 0, bitmap.width, DIGIT_TRAIN_ELEMENTS, 0, 0, bitmap.width, DIGIT_TRAIN_ELEMENTS);
  const imageData = ctx.getImageData(0, 0, bitmap.width, DIGIT_TRAIN_ELEMENTS);

  const floatData = new Float32Array(DIGIT_TRAIN_ELEMENTS * DIGIT_IMAGE_SIZE);
  for (let j = 0; j < floatData.length; j++) floatData[j] = imageData.data[j * 4] / 255;

  const labelsResp = await fetch(MNIST_LABELS_PATH);
  if (!labelsResp.ok) throw new Error('Download etichette fallito: HTTP ' + labelsResp.status);
  const labelsBuffer = await labelsResp.arrayBuffer();
  const labelsFull = new Uint8Array(labelsBuffer);
  const labels = labelsFull.slice(0, DIGIT_TRAIN_ELEMENTS * DIGIT_NUM_CLASSES);

  // Augmentation: copie dei "7" con trattino orizzontale stile europeo
  const sevenIndices = [];
  for (let i = 0; i < DIGIT_TRAIN_ELEMENTS; i++) {
    if (labels[i * DIGIT_NUM_CLASSES + 7] === 1) sevenIndices.push(i);
  }
  const augCount = sevenIndices.length;
  const augFloatData = new Float32Array(augCount * DIGIT_IMAGE_SIZE);
  const augLabels = new Float32Array(augCount * DIGIT_NUM_CLASSES);
  sevenIndices.forEach((srcIdx, k) => {
    const srcOffset = srcIdx * DIGIT_IMAGE_SIZE;
    const dstOffset = k * DIGIT_IMAGE_SIZE;
    augFloatData.set(floatData.subarray(srcOffset, srcOffset + DIGIT_IMAGE_SIZE), dstOffset);
    const row = 16;
    for (let col = 5; col <= 22; col++) {
      augFloatData[dstOffset + row * 28 + col] = 1.0;
      augFloatData[dstOffset + (row + 1) * 28 + col] = 1.0;
    }
    augLabels[k * DIGIT_NUM_CLASSES + 7] = 1;
  });

  const totalElements = DIGIT_TRAIN_ELEMENTS + augCount;
  const combinedFloatData = new Float32Array(totalElements * DIGIT_IMAGE_SIZE);
  combinedFloatData.set(floatData, 0);
  combinedFloatData.set(augFloatData, DIGIT_TRAIN_ELEMENTS * DIGIT_IMAGE_SIZE);
  const combinedLabels = new Float32Array(totalElements * DIGIT_NUM_CLASSES);
  combinedLabels.set(labels, 0);
  combinedLabels.set(augLabels, DIGIT_TRAIN_ELEMENTS * DIGIT_NUM_CLASSES);

  const xs = tf.tensor4d(combinedFloatData, [totalElements, 28, 28, 1]);
  const ys = tf.tensor2d(combinedLabels, [totalElements, DIGIT_NUM_CLASSES]);
  return { xs, ys };
}

function buildDigitModel() {
  const model = tf.sequential();
  model.add(tf.layers.conv2d({ inputShape: [28, 28, 1], kernelSize: 5, filters: 8, strides: 1, activation: 'relu', kernelInitializer: 'varianceScaling' }));
  model.add(tf.layers.maxPooling2d({ poolSize: [2, 2], strides: [2, 2] }));
  model.add(tf.layers.conv2d({ kernelSize: 5, filters: 16, strides: 1, activation: 'relu', kernelInitializer: 'varianceScaling' }));
  model.add(tf.layers.maxPooling2d({ poolSize: [2, 2], strides: [2, 2] }));
  model.add(tf.layers.flatten());
  model.add(tf.layers.dense({ units: 10, kernelInitializer: 'varianceScaling', activation: 'softmax' }));
  model.compile({ optimizer: tf.train.adam(), loss: 'categoricalCrossentropy', metrics: ['accuracy'] });
  return model;
}

// Ritaglia la cifra scritta a mano, mantiene le proporzioni (lato lungo = 20px)
// e la centra in 28x28 come lo standard MNIST. Inverte i colori.
function digitCanvasToTensor(canvas) {
  const ctx = canvas.getContext('2d');
  const { width, height } = canvas;
  const imgData = ctx.getImageData(0, 0, width, height);
  let minX = width, maxX = 0, minY = height, maxY = 0;
  for (let y = 0; y < height; y++) {
    for (let x = 0; x < width; x++) {
      const idx = (y * width + x) * 4;
      if (imgData.data[idx + 3] > 0 && imgData.data[idx] < 200) {
        if (x < minX) minX = x;
        if (x > maxX) maxX = x;
        if (y < minY) minY = y;
        if (y > maxY) maxY = y;
      }
    }
  }
  if (maxX <= minX || maxY <= minY) return null;

  const cropW = maxX - minX + 1;
  const cropH = maxY - minY + 1;
  const TARGET = 20;
  const scale = TARGET / Math.max(cropW, cropH);
  const destW = Math.max(1, Math.round(cropW * scale));
  const destH = Math.max(1, Math.round(cropH * scale));

  const small = document.createElement('canvas');
  small.width = 28;
  small.height = 28;
  const smctx = small.getContext('2d');
  smctx.fillStyle = 'white';
  smctx.fillRect(0, 0, 28, 28);
  const offsetX = Math.round((28 - destW) / 2);
  const offsetY = Math.round((28 - destH) / 2);
  smctx.drawImage(canvas, minX, minY, cropW, cropH, offsetX, offsetY, destW, destH);

  const data = smctx.getImageData(0, 0, 28, 28).data;
  const floatData = new Float32Array(28 * 28);
  for (let i = 0; i < 28 * 28; i++) floatData[i] = 1 - data[i * 4] / 255;
  return tf.tensor4d(floatData, [1, 28, 28, 1]);
}

function useDigitModel() {
  const [model, setModel] = useState(null);
  const [status, setStatus] = useState('init'); // init | training | ready | error
  const [errorMsg, setErrorMsg] = useState(null);
  const [trainProgress, setTrainProgress] = useState(0);
  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const loaded = await tf.loadLayersModel(DIGIT_MODEL_KEY);
        if (cancelled) return;
        setModel(loaded);
        setStatus('ready');
        return;
      } catch (e) { /* nessun modello in cache, addestro */ }
      try {
        // Forza il motore veloce (WebGL/GPU); senza, l'addestramento su CPU
        // può richiedere diversi minuti invece di ~15-20 secondi.
        try { await tf.setBackend('webgl'); } catch (e) {}
        await tf.ready();
        setStatus('training');
        const EPOCHS = 8;
        const { xs, ys } = await loadMnistTrainingData();
        const m = buildDigitModel();
        await m.fit(xs, ys, {
          batchSize: 128,
          epochs: EPOCHS,
          validationSplit: 0.1,
          callbacks: {
            onEpochEnd: (epoch) => {
              if (cancelled) return;
              setTrainProgress(Math.round(((epoch + 1) / EPOCHS) * 100));
            },
          },
        });
        xs.dispose(); ys.dispose();
        if (cancelled) return;
        await m.save(DIGIT_MODEL_KEY);
        setModel(m);
        setStatus('ready');
      } catch (e) {
        console.error('Errore addestramento modello cifre:', e);
        if (!cancelled) {
          setErrorMsg((e && e.message) ? e.message : String(e));
          setStatus('error');
        }
      }
    })();
    return () => { cancelled = true; };
  }, []);
  return { model, status, errorMsg, trainProgress };
}

function recognizeDigit(model, canvas) {
  const tensor = digitCanvasToTensor(canvas);
  if (!tensor) return null;
  const pred = model.predict(tensor);
  const data = pred.dataSync();
  tensor.dispose();
  pred.dispose();
  let best = 0;
  for (let i = 1; i < 10; i++) if (data[i] > data[best]) best = i;
  return { digit: best, confidence: data[best] };
}

// Store delle correzioni: vive per tutta la sessione (fuori da React, non si
// azzera quando i componenti esercizio si smontano tra un esercizio e l'altro)
const digitLearningStore = { items: [], busy: false };

// Ogni volta che sappiamo con certezza cosa Virginia ha scritto (il risultato
// atteso dell'esercizio), usiamo quell'immagine+etichetta vera per rifinire
// il modello sulla sua calligrafia reale — sia che l'abbia letta giusta o no.
async function fineTuneOnRealExample(model, canvasesByIndex, trueDigits) {
  if (!model || digitLearningStore.busy) return;
  digitLearningStore.busy = true;
  try {
    for (let i = 0; i < trueDigits.length; i++) {
      const canvas = canvasesByIndex[i];
      if (!canvas) continue;
      const tensor = digitCanvasToTensor(canvas);
      if (!tensor) continue;
      digitLearningStore.items.push({ tensor, digit: trueDigits[i] });
    }
    // Limite di sicurezza sulla memoria: tiene solo gli ultimi 300 esempi
    while (digitLearningStore.items.length > 300) {
      digitLearningStore.items.shift().tensor.dispose();
    }
    if (digitLearningStore.items.length < 2) { digitLearningStore.busy = false; return; }

    const xsAll = tf.concat(digitLearningStore.items.map((c) => c.tensor), 0);
    const labelsData = new Float32Array(digitLearningStore.items.length * 10);
    digitLearningStore.items.forEach((c, i) => { labelsData[i * 10 + c.digit] = 1; });
    const ysAll = tf.tensor2d(labelsData, [digitLearningStore.items.length, 10]);

    model.compile({ optimizer: tf.train.adam(0.0003), loss: 'categoricalCrossentropy', metrics: ['accuracy'] });
    await model.fit(xsAll, ysAll, { epochs: 6, batchSize: Math.min(64, digitLearningStore.items.length), shuffle: true });
    xsAll.dispose();
    ysAll.dispose();
    await model.save(DIGIT_MODEL_KEY);
  } catch (e) {
    console.error('Errore fine-tuning su esempio reale:', e);
  } finally {
    digitLearningStore.busy = false;
  }
}

// Piccolo canvas per una singola cifra, usato nell'esercizio di calcolo
function SingleDigitCanvas({ onStrokeEnd, size = 90 }) {
  const canvasRef = useRef(null);
  const drawing = useRef(false);
  const hasDrawn = useRef(false);

  useEffect(() => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = 'white';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.lineWidth = 9;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = '#1E1B2E';
  }, []);

  const getPos = (e, canvas) => {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: (clientX - rect.left) * (canvas.width / rect.width), y: (clientY - rect.top) * (canvas.height / rect.height) };
  };
  const start = (e) => {
    e.preventDefault();
    drawing.current = true;
    hasDrawn.current = true;
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    const pos = getPos(e, canvas);
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
  };
  const move = (e) => {
    if (!drawing.current) return;
    e.preventDefault();
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    const pos = getPos(e, canvas);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
  };
  const end = () => {
    if (drawing.current) { drawing.current = false; onStrokeEnd(canvasRef.current); }
  };
  const clear = () => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = 'white';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    hasDrawn.current = false;
    onStrokeEnd(null);
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6 }}>
      <canvas
        ref={canvasRef}
        width={size}
        height={size}
        style={{ border: '3px solid #C4B5FD', borderRadius: 14, touchAction: 'none', background: 'white', width: size, height: size }}
        onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end}
        onTouchStart={start} onTouchMove={move} onTouchEnd={end}
      />
      <button onClick={clear} style={{ padding: '4px 10px', borderRadius: 10, border: 'none', background: '#EDE9FE', color: '#5B21B6', fontWeight: 700, fontSize: 12, cursor: 'pointer' }}>Cancella</button>
    </div>
  );
}

// ---------- NUMERI IN LETTERE (IT e CA) ----------
const NUM_IT = {0:"zero",1:"uno",2:"due",3:"tre",4:"quattro",5:"cinque",6:"sei",7:"sette",8:"otto",9:"nove",10:"dieci",11:"undici",12:"dodici",13:"tredici",14:"quattordici",15:"quindici",16:"sedici",17:"diciassette",18:"diciotto",19:"diciannove",20:"venti",21:"ventuno",22:"ventidue",23:"ventitré",24:"ventiquattro",25:"venticinque",26:"ventisei",27:"ventisette",28:"ventotto",29:"ventinove",30:"trenta",35:"trentacinque",40:"quaranta",45:"quarantacinque",50:"cinquanta"};
function numToWordsIT(n) {
  if (NUM_IT[n]) return NUM_IT[n];
  const tens = Math.floor(n/10)*10, units = n%10;
  const tensWords = {20:"venti",30:"trenta",40:"quaranta",50:"cinquanta"};
  if (units === 1 || units === 8) return tensWords[tens].slice(0,-1) + numToWordsIT(units);
  return tensWords[tens] + numToWordsIT(units);
}

// ---------- GENERATORE ADDIZIONI/SOTTRAZIONI con bias su 16/17 ----------
function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function generateAddition(forceTarget) {
  let result, a, b;
  if (forceTarget) {
    result = forceTarget;
    a = randInt(1, result - 1);
    b = result - a;
  } else {
    a = randInt(1, 30);
    b = randInt(1, Math.min(50 - a, 30));
    result = a + b;
  }
  return { a, b, result, type: "add" };
}

function generateSubtraction(forceTarget) {
  let result, a, b;
  if (forceTarget) {
    // a sempre due cifre, b sempre una cifra, risultato forzato a 16 o 17
    result = forceTarget;
    b = randInt(1, 9);
    a = result + b;
    if (a > 50) { b = randInt(1, a - 41); a = result + b; }
  } else {
    // a sempre a due cifre (10-50), b sempre a una cifra (1-9)
    a = randInt(11, 50);
    b = randInt(1, 9);
    result = a - b;
  }
  return { a, b, result, type: "sub" };
}

function makeCalcExercise(opType, forceBias) {
  const target = forceBias ? (Math.random() < 0.5 ? 16 : 17) : null;
  const calc = opType === "add" ? generateAddition(target) : generateSubtraction(target);
  const correctWord = numToWordsIT(calc.result);
  return {
    type: "calc",
    opType,
    a: calc.a,
    b: calc.b,
    result: calc.result,
    correctWord,
  };
}

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ---------- COSTRUZIONE 6 MISSIONI ----------
function buildMissions() {
  const missions = [];
  // Mescolate una volta per partita: così si usano tutte le frasi del pool
  // (prima si pescavano sempre e solo le prime 3 su 6, sempre uguali)
  const shuffledReadIT = shuffleArray(READ_SENTENCES_IT);
  const shuffledReadCA = shuffleArray(READ_SENTENCES_CA);
  const shuffledWriteIT = shuffleArray(WRITE_PROMPTS_IT);
  const shuffledWriteCA = shuffleArray(WRITE_PROMPTS_CA);
  for (let m = 0; m < 60; m++) {
    const invertLang = m % 2 === 1; // missioni dispari (1,3,5) invertite

    // Missione PARI (0,2,4): legge ITA, scrive CAT
    // Missione DISPARI (1,3,5): legge CAT, scrive ITA
    const readLang = invertLang ? "CA" : "IT";
    const writeLang = invertLang ? "IT" : "CA";
    const readPool = invertLang ? shuffledReadCA : shuffledReadIT;
    const writePool = invertLang ? shuffledWriteIT : shuffledWriteCA;
    const poolIdx = Math.floor(m / 2) % readPool.length;
    const readItem = readPool[poolIdx];
    const writeItem = writePool[poolIdx];

    missions.push({
      id: `mission-${m}`,
      title: `Missione ${m + 1}`,
      exercises: [
        { id: `m${m}-add`, ...makeCalcExercise("add", m % 2 === 0) },
        { id: `m${m}-sub`, ...makeCalcExercise("sub", m % 2 === 1) },
        { id: `m${m}-read`, type: "read", lang: readLang, text: readItem.text, emoji: readItem.emoji },
        { id: `m${m}-write`, type: "write", lang: writeLang, sentence: writeItem.sentence, emoji: writeItem.emoji },
      ],
    });
  }
  return missions;
}

function LeMissioniDiVirginia() {
  const [currentIndex, setCurrentIndex] = useState(0);
  const [completed, setCompleted] = useState({});
  const [stars, setStars] = useState(0);
  const [loaded, setLoaded] = useState(false);
  const [showCelebration, setShowCelebration] = useState(null);
  const [soundOn, setSoundOn] = useState(true);
  const [errors, setErrors] = useState([]);
  const [showParentSection, setShowParentSection] = useState(false);
  const playSound = useSound(soundOn);
  const { model: digitModel, status: digitModelStatus, errorMsg: digitModelError, trainProgress: digitTrainProgress } = useDigitModel();

  useEffect(() => {
    (async () => {
      try {
        const res = await storage.get(STORAGE_KEY);
        if (res?.value) {
          const data = JSON.parse(res.value);
          setCompleted(data.completed || {});
          setStars(data.stars || 0);
          setCurrentIndex(data.currentIndex || 0);
        }
      } catch (e) {}
      try {
        const errRes = await storage.get(ERRORS_KEY);
        if (errRes?.value) setErrors(JSON.parse(errRes.value));
      } catch (e) {}
      setLoaded(true);
    })();
  }, []);

  const saveProgress = useCallback(async (newCompleted, newStars, newIndex) => {
    try { await storage.set(STORAGE_KEY, JSON.stringify({ completed: newCompleted, stars: newStars, currentIndex: newIndex })); }
    catch (e) {}
  }, []);

  const logError = useCallback((type, missionTitle, label) => {
    setErrors((prev) => {
      const next = [...prev, { type, missionTitle, label, date: new Date().toLocaleDateString('it-IT') }];
      storage.set(ERRORS_KEY, JSON.stringify(next)).catch(() => {});
      return next;
    });
  }, []);

  const clearErrors = useCallback(async () => {
    setErrors([]);
    await storage.set(ERRORS_KEY, JSON.stringify([]));
  }, []);

  const currentExercise = FLAT_EXERCISES[currentIndex];
  const totalDone = Object.keys(completed).length;
  const currentMissionIndex = MISSIONS.findIndex((m) => m.id === currentExercise?.missionId);

  const handleExerciseComplete = (earnedStar) => {
    const exId = currentExercise.id;
    const newCompleted = { ...completed, [exId]: true };
    const newStars = earnedStar ? stars + 1 : stars;
    setCompleted(newCompleted);
    setStars(newStars);

    const missionExercises = MISSIONS[currentMissionIndex].exercises;
    const missionJustFinished = missionExercises.every((e) => newCompleted[e.id]);

    if (missionJustFinished) {
      playSound(Sound.missionDone);
      setShowCelebration("mission");
    } else {
      playSound(Sound.exerciseDone);
      setShowCelebration("exercise");
    }

    setTimeout(() => {
      setShowCelebration(null);
      const nextIndex = Math.min(currentIndex + 1, FLAT_EXERCISES.length - 1);
      setCurrentIndex(nextIndex);
      saveProgress(newCompleted, newStars, nextIndex);
    }, missionJustFinished ? 2600 : 1200);
  };

  const goToIndex = (idx) => { setCurrentIndex(idx); saveProgress(completed, stars, idx); };
  const resetProgress = async () => { setCompleted({}); setStars(0); setCurrentIndex(0); await saveProgress({}, 0, 0); };

  const isLastExercise = currentIndex === FLAT_EXERCISES.length - 1;
  const allDone = totalDone === FLAT_EXERCISES.length;
  const missionsCompletedCount = MISSIONS.filter((m) => m.exercises.every((e) => completed[e.id])).length;

  if (!loaded) {
    return (
      <div style={styles.loadingScreen}>
        <FontLoader />
        <div style={styles.loadingSpinner}>🦄</div>
        <p style={{ fontFamily: "Quicksand, sans-serif", color: "#7C3AED", fontWeight: 700 }}>Preparazione missioni...</p>
      </div>
    );
  }

  if (showParentSection) {
    return (
      <div style={styles.app}>
        <FontLoader />
        <ParentSection errors={errors} onBack={() => setShowParentSection(false)} onClear={clearErrors} />
      </div>
    );
  }

  if (allDone) {
    return (
      <div style={styles.app}>
        <FontLoader />
        <FinalScreen stars={stars} missionsCount={MISSIONS.length} onReset={resetProgress} />
      </div>
    );
  }

  return (
    <div style={styles.app}>
      <FontLoader />
      <button
        onClick={() => setShowParentSection(true)}
        style={{ position: "fixed", top: 14, right: 14, zIndex: 40, background: "white", border: "2px solid #EDE9FE", borderRadius: 999, width: 44, height: 44, fontSize: 20, cursor: "pointer", boxShadow: "0 2px 8px rgba(124,58,237,0.15)" }}
        aria-label="Sezione genitori"
      >
        👨‍👧
        {errors.length > 0 && (
          <span style={{ position: "absolute", top: -4, right: -4, background: "#DC2626", color: "white", borderRadius: 999, fontSize: 11, minWidth: 18, height: 18, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800 }}>
            {errors.length}
          </span>
        )}
      </button>
      <p style={styles.appTitle}>🦄 Le Missioni di Virginia 🦄</p>
      <TopBar
        stars={stars}
        missionsDone={missionsCompletedCount}
        totalMissions={MISSIONS.length}
        totalDone={totalDone}
        totalExercises={FLAT_EXERCISES.length}
        soundOn={soundOn}
        onToggleSound={() => setSoundOn((s) => !s)}
      />
      <MissionStrip
        missions={MISSIONS}
        completed={completed}
        currentMissionIndex={currentMissionIndex}
      />
      <ExerciseStage
        key={currentExercise.id}
        exercise={currentExercise}
        missionTitle={currentExercise.missionTitle}
        isLast={isLastExercise}
        onComplete={handleExerciseComplete}
        onError={(label) => logError(currentExercise.type, currentExercise.missionTitle, label)}
        playSound={playSound}
        digitModel={digitModel}
        digitModelStatus={digitModelStatus}
        digitModelError={digitModelError}
        digitTrainProgress={digitTrainProgress}
      />
      {showCelebration === "exercise" && <BurstCelebration />}
      {showCelebration === "mission" && <MissionCelebration missionTitle={currentExercise.missionTitle} />}
      <button onClick={resetProgress} style={styles.resetButton}>Ricomincia le missioni</button>
    </div>
  );
}

function CalcExercise({ exercise, onComplete, onError, playSound, digitModel, digitModelStatus, digitModelError, digitTrainProgress }) {
  const [done, setDone] = useState(false);
  const [digits, setDigits] = useState({}); // { 0: {digit, confidence}|null, 1: ... }
  const [checking, setChecking] = useState(false);
  const [feedback, setFeedback] = useState(null); // { ok: bool, recognized: number } | null
  const [manualMode, setManualMode] = useState(false);
  const symbol = exercise.opType === "add" ? "+" : "−";
  const numDigits = String(exercise.result).length;
  const canvasesRef = useRef({});

  const handleStrokeEnd = (idx, canvas) => {
    canvasesRef.current[idx] = canvas;
    setDigits((d) => ({ ...d, [idx]: canvas ? "pending" : null }));
  };

  const allFilled = Array.from({ length: numDigits }).every((_, i) => canvasesRef.current[i]);

  const verifica = () => {
    if (!digitModel || checking) return;
    setChecking(true);
    setFeedback(null);
    let recognizedStr = "";
    const canvasesSnapshot = { ...canvasesRef.current };
    for (let i = 0; i < numDigits; i++) {
      const canvas = canvasesSnapshot[i];
      if (!canvas) { setChecking(false); return; }
      const r = recognizeDigit(digitModel, canvas);
      if (!r) { setChecking(false); return; }
      recognizedStr += String(r.digit);
    }
    const recognized = parseInt(recognizedStr, 10);
    const ok = recognized === exercise.result;
    setFeedback({ ok, recognized });
    setChecking(false);

    // Impara dalla scrittura reale di Virginia: sappiamo già qual è la cifra
    // giusta in ogni casella (il risultato atteso), quindi ogni tentativo
    // diventa un esempio di allenamento vero, giusto o sbagliato che sia.
    const trueDigits = String(exercise.result).padStart(numDigits, "0").split("").map(Number);
    fineTuneOnRealExample(digitModel, canvasesSnapshot, trueDigits);

    if (ok) {
      setDone(true);
      playSound(Sound.correct);
      onComplete(true);
    } else {
      playSound(Sound.wrong);
      onError(`${exercise.a} ${symbol} ${exercise.b} = ? (ha scritto ${recognized}, giusto era ${exercise.result})`);
    }
  };

  const riprova = () => {
    setFeedback(null);
    setDigits({});
    canvasesRef.current = {};
  };

  const markCorrectManual = () => {
    if (done) return;
    if (digitModel) {
      const snapshot = { ...canvasesRef.current };
      const trueDigits = String(exercise.result).padStart(numDigits, "0").split("").map(Number);
      fineTuneOnRealExample(digitModel, snapshot, trueDigits);
    }
    setDone(true);
    playSound(Sound.correct);
    onComplete(true);
  };
  const markWrongManual = () => {
    riprova();
    playSound(Sound.wrong);
    onError(`${exercise.a} ${symbol} ${exercise.b} = ${exercise.result} (corretto a mano dal genitore)`);
  };

  return (
    <>
      <p style={styles.eyebrow}>{exercise.opType === "add" ? "ADDIZIONE" : "SOTTRAZIONE"} — SCRIVI IL RISULTATO</p>
      <div style={styles.calcDisplay}>
        <span style={styles.calcNum}>{exercise.a}</span>
        <span style={styles.calcSymbol}>{symbol}</span>
        <span style={styles.calcNum}>{exercise.b}</span>
        <span style={styles.calcSymbol}>=</span>
        <span style={styles.calcQuestion}>?</span>
      </div>

      <div style={{ display: "flex", justifyContent: "center", gap: 12, margin: "14px 0" }}>
        {Array.from({ length: numDigits }).map((_, i) => (
          <SingleDigitCanvas key={i} size={100} onStrokeEnd={(c) => handleStrokeEnd(i, c)} />
        ))}
      </div>

      {digitModelStatus === "training" && (
        <>
          <p style={{ ...styles.parentNote, color: "#7C3AED" }}>
            🤖 Sto imparando a leggere i numeri: {digitTrainProgress}% (solo la prima volta)
          </p>
          <p style={{ fontSize: 11, color: "#9CA3AF", textAlign: "center", marginTop: -6, marginBottom: 8 }}>
            Non chiudere questa pagina finché non arriva al 100% — altrimenti si riparte da capo.
          </p>
        </>
      )}
      {digitModelStatus === "error" && (
        <>
          <p style={{ ...styles.parentNote, color: "#B91C1C" }}>Riconoscimento automatico non disponibile ora — usa la verifica manuale qui sotto.</p>
          {digitModelError && (
            <p style={{ fontSize: 11, color: "#B91C1C", fontFamily: "monospace", textAlign: "center", wordBreak: "break-word", marginBottom: 8 }}>
              {digitModelError}
            </p>
          )}
        </>
      )}

      {!done && digitModelStatus === "ready" && !manualMode && (
        <>
          <button
            onClick={verifica}
            disabled={!allFilled || checking}
            style={{ ...styles.finishButton, opacity: allFilled && !checking ? 1 : 0.5, marginBottom: 8 }}
          >
            {checking ? "..." : "✨ Controlla"}
          </button>
          {feedback && !feedback.ok && (
            <div style={{ textAlign: "center", marginBottom: 8 }}>
              <p style={styles.feedbackWrong}>Hai scritto {feedback.recognized}. Riprova! 💪</p>
              <button onClick={riprova} style={styles.clearButton}>🧹 Riprova</button>
            </div>
          )}
          <p style={{ fontSize: 12, color: "#9CA3AF", textAlign: "center", cursor: "pointer", textDecoration: "underline" }} onClick={() => setManualMode(true)}>
            Un adulto vuole correggere a mano?
          </p>
        </>
      )}

      {(manualMode || digitModelStatus !== "ready") && !done && (
        <>
          <p style={styles.parentNote}>Un adulto controlla: il numero scritto è giusto?</p>
          <div style={styles.checkRow}>
            <button onClick={markCorrectManual} style={styles.correctCheckButton}>✅ Giusto</button>
            <button onClick={markWrongManual} style={styles.wrongCheckButton}>❌ Sbagliato</button>
          </div>
        </>
      )}

      {done && <p style={styles.doneLabel}>✓ Bravissima!</p>}
    </>
  );
}

function ReadExercise({ exercise, onComplete, onError, playSound }) {
  const [done, setDone] = useState(false);
  const badge = LANG_BADGE[exercise.lang];
  const markCorrect = () => { if (done) return; setDone(true); playSound(Sound.correct); onComplete(true); };
  const markWrong = () => { playSound(Sound.wrong); onError(exercise.text); };
  return (
    <>
      <p style={styles.eyebrow}>LEGGI AD ALTA VOCE {badge.flag} <span style={{ ...styles.langBadgeInline, background: badge.color }}>{badge.label}</span></p>
      <span style={styles.sceneEmojiBig}>{exercise.emoji}</span>
      <p style={styles.readSentence}>{exercise.text}</p>
      <p style={styles.parentNote}>Un adulto ascolta: l'ha letta bene?</p>
      {!done ? (
        <div style={styles.checkRow}>
          <button onClick={markCorrect} style={styles.correctCheckButton}>✅ Bravissima</button>
          <button onClick={markWrong} style={styles.wrongCheckButton}>❌ Riprova</button>
        </div>
      ) : (
        <p style={styles.doneLabel}>✓ Bravissima!</p>
      )}
    </>
  );
}

function WriteExercise({ exercise, onComplete, onError, playSound }) {
  const canvasRef = useRef(null);
  const isDrawing = useRef(false);
  const lastPos = useRef({ x: 0, y: 0 });
  const [hasDrawn, setHasDrawn] = useState(false);
  const [done, setDone] = useState(false);
  const [showHint, setShowHint] = useState(false);
  const badge = LANG_BADGE[exercise.lang];

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const ratio = window.devicePixelRatio || 1;
    canvas.width = canvas.clientWidth * ratio;
    canvas.height = canvas.clientHeight * ratio;
    ctx.scale(ratio, ratio);
  }, []);

  const getPos = (e) => {
    const canvas = canvasRef.current;
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: clientX - rect.left, y: clientY - rect.top };
  };
  const startDraw = (e) => { isDrawing.current = true; lastPos.current = getPos(e); setHasDrawn(true); };
  const draw = (e) => {
    if (!isDrawing.current) return;
    e.preventDefault();
    const ctx = canvasRef.current.getContext("2d");
    const pos = getPos(e);
    ctx.strokeStyle = "#1E1B2E"; ctx.lineWidth = 2.5; ctx.lineCap = "round"; ctx.lineJoin = "round";
    ctx.beginPath(); ctx.moveTo(lastPos.current.x, lastPos.current.y); ctx.lineTo(pos.x, pos.y); ctx.stroke();
    lastPos.current = pos;
  };
  const stopDraw = () => { isDrawing.current = false; };
  const clearCanvas = () => { const canvas = canvasRef.current; canvas.getContext("2d").clearRect(0, 0, canvas.width, canvas.height); setHasDrawn(false); };
  const finish = () => { if (done) return; setDone(true); playSound(Sound.correct); onComplete(true); };

  return (
    <>
      <p style={styles.eyebrow}>COPIA LA FRASE {badge.flag} <span style={{ ...styles.langBadgeInline, background: badge.color }}>{badge.label}</span></p>
      <span style={styles.sceneEmojiBig}>{exercise.emoji}</span>
      <p style={styles.readSentence}>{exercise.sentence}</p>
      <div style={styles.canvasWrapBig}>
        <canvas ref={canvasRef} style={styles.canvasBig} onMouseDown={startDraw} onMouseMove={draw} onMouseUp={stopDraw} onMouseLeave={stopDraw} onTouchStart={startDraw} onTouchMove={draw} onTouchEnd={stopDraw} />
      </div>
      <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
        <button onClick={clearCanvas} style={styles.clearButton}>🧹 Pulisci</button>
        <button onClick={() => setShowHint((s) => !s)} style={styles.hintButton}>💡 {showHint ? "Nascondi" : "Aiuto"}</button>
      </div>
      {showHint && <p style={styles.hintLine}>{exercise.hint}</p>}
      <p style={styles.parentNote}>Lo rivede un adulto — quando hai finito, premi "Ho finito".</p>
      {!done ? (
        <button onClick={finish} disabled={!hasDrawn} style={{ ...styles.finishButton, opacity: hasDrawn ? 1 : 0.5 }}>Ho finito ✓</button>
      ) : (
        <p style={styles.doneLabel}>✓ Fatto! Bel lavoro.</p>
      )}
    </>
  );
}

function ParentSection({ errors, onBack, onClear }) {
  return (

        <h2 style={styles.parentTitle}>👨‍👧 SEZIONE GENITORI</h2>

  );
}

function BurstCelebration() {
  const particles = Array.from({ length: 12 }, (_, i) => i);
  return (
    <div style={styles.celebrationOverlay}>
      {particles.map((i) => {
        const angle = (i / particles.length) * 2 * Math.PI;
        const dist = 80 + Math.random() * 50;
        return (<span key={i} style={{ ...styles.particle, transform: `translate(${Math.cos(angle) * dist}px, ${Math.sin(angle) * dist}px)` }}>⭐</span>);
      })}
    </div>
  );
}

function MissionCelebration({ missionTitle }) {
  const particles = Array.from({ length: 28 }, (_, i) => i);
  return (
    <div style={styles.celebrationOverlay}>

        const dist = 130 + Math.random() * 100;
        const emoji = ["🏆", "🦄", "✨", "⭐", "🌈"][i % 5];
        return (<span key={i} style={{ ...styles.particleBig, transform: `translate(${Math.cos(angle) * dist}px, ${Math.sin(angle) * dist}px)` }}>{emoji}</span>);
      })}
      <div style={styles.missionBanner}>

        <p style={styles.missionBannerSub}>🏆 Premio sbloccato 🏆</p>
      </div>
    </div>
  );
}
